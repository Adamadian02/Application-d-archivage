{% extends 'base.html' %}
{% block title %}Supprimer catégorie — GED{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4"><div class="col-12 col-md-5"><div class="card"><div class="card-body text-center" style="padding:32px;"><div style="font-size:48px;color:#ef4444;margin-bottom:16px;"><i class="bi bi-folder-x"></i></div><h5>Supprimer "{{ categorie.nom }}" ?</h5><p class="text-muted text-sm mt-2">Les documents associés ne seront pas supprimés mais perdront leur catégorie.</p><div class="d-flex gap-2 justify-content-center mt-4"><a href="{% url 'liste_categories' %}" class="btn btn-outline">Annuler</a><form method="post" style="display:inline;">{% csrf_token %}<button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Supprimer</button></form></div></div></div></div></div>
{% endblock %}
