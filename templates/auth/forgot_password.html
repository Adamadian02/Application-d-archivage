<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié — GED</title>
  {% load static %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card" style="max-width:420px;width:100%;">
    <div class="auth-header">
      <div class="auth-logo"><i class="bi bi-lock-fill"></i></div>
      <div class="auth-title">Mot de passe oublié</div>
      <div class="auth-subtitle">Entrez votre email pour réinitialiser</div>
    </div>
    <div class="auth-body">
      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="form-label">Adresse email</label>
          <div style="position:relative;">
            <i class="bi bi-envelope" style="position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:15px;"></i>
            <input type="email" name="email" class="form-control" style="padding-left:38px;" placeholder="votre@email.com" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg"><i class="bi bi-send"></i> Envoyer le lien</button>
        <div class="text-center mt-3"><a href="{% url 'connexion' %}" style="font-size:13px;color:#2563eb;"><i class="bi bi-arrow-left me-1"></i>Retour à la connexion</a></div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
